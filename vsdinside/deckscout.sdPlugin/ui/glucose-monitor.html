<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>DeckScout</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        font-family: Inter, system-ui, sans-serif;
        margin: 0;
        padding: 16px;
        color: #e8eaed;
        background: #171717;
      }
      .card {
        background: #202124;
        border: 1px solid #34373c;
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 14px;
      }
      .title {
        font-size: 18px;
        font-weight: 700;
        margin: 0 0 4px;
      }
      .subtitle {
        color: #a7adb5;
        font-size: 12px;
        margin: 0;
      }
      label {
        display: block;
        margin: 12px 0 6px;
        font-size: 12px;
        color: #c9cdd3;
      }
      input, select {
        width: 100%;
        box-sizing: border-box;
        padding: 9px 10px;
        border-radius: 8px;
        border: 1px solid #444;
        background: #111;
        color: #fff;
      }
      input[type="color"] {
        padding: 4px;
        height: 42px;
        background: #111;
        border-radius: 10px;
        cursor: pointer;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .check {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 12px;
        font-size: 13px;
      }
      .check input {
        width: auto;
      }
      .section {
        overflow: hidden;
      }
      .section-toggle {
        width: calc(100% + 28px);
        margin: -14px -14px 0;
        padding: 14px;
        border: 0;
        border-radius: 14px 14px 0 0;
        background: transparent;
        color: inherit;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        text-align: left;
      }
      .section-toggle:hover {
        background: rgba(255,255,255,0.03);
      }
      .section-toggle .title-wrap {
        min-width: 0;
      }
      .section-toggle .chevron {
        font-size: 16px;
        color: #a7adb5;
        margin-left: 10px;
      }
      .section-content {
        padding-top: 12px;
      }
      .section.collapsed .section-content {
        display: none;
      }
      .section.collapsed .section-toggle {
        border-radius: 14px;
      }
      button {
        width: 100%;
        margin-top: 14px;
        padding: 11px 12px;
        border: 0;
        border-radius: 10px;
        background: linear-gradient(135deg, #2563eb, #3b82f6);
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      .hint {
        color: #9aa0a6;
        font-size: 11px;
        margin-top: 10px;
        line-height: 1.45;
      }
      .pill {
        display: inline-block;
        padding: 3px 8px;
        border-radius: 999px;
        background: #0f2c1b;
        color: #86efac;
        font-size: 11px;
        font-weight: 700;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div class="card section" data-section="about">
      <button class="section-toggle" type="button" data-target="about">
        <span class="title-wrap">
          <p class="title">DeckScout</p>
          <p class="subtitle">Nightscout glucose monitor for Stream Deck / VSDinside</p>
        </span>
        <span class="chevron">▾</span>
      </button>
      <div class="section-content">
        <div class="pill">Dexcom-friendly 305s polling</div>
      </div>
    </div>

    <div class="card section" data-section="nightscout">
      <button class="section-toggle" type="button" data-target="nightscout">
        <span class="title-wrap">
          <p class="title">Nightscout</p>
          <p class="subtitle">Connection and base URL</p>
        </span>
        <span class="chevron">▾</span>
      </button>
      <div class="section-content">
        <label>Nightscout base URL</label>
        <input id="baseUrl" placeholder="https://nas.tail17fc34.ts.net" />
        <div class="hint">Local-first: point this at your LAN, Tailscale, or other self-hosted Nightscout URL.</div>
      </div>
    </div>

    <div class="card section" data-section="settings">
      <button class="section-toggle" type="button" data-target="settings">
        <span class="title-wrap">
          <p class="title">Settings</p>
          <p class="subtitle">Units, thresholds, layout, and timing</p>
        </span>
        <span class="chevron">▾</span>
      </button>
      <div class="section-content">
        <div class="row">
          <div>
            <label>Units</label>
            <select id="unit">
              <option value="mgdl">mg/dL</option>
              <option value="mmol">mmol/L</option>
            </select>
          </div>
          <div>
            <label>Poll every (seconds)</label>
            <input id="pollSeconds" type="number" value="305" min="60" />
          </div>
        </div>

        <div class="row">
          <div>
            <label>Low threshold</label>
            <input id="lowThreshold" type="number" value="80" />
          </div>
          <div>
            <label>High threshold</label>
            <input id="highThreshold" type="number" value="180" />
          </div>
        </div>

        <div class="row">
          <div>
            <label>Stale after (minutes)</label>
            <input id="staleMinutes" type="number" value="15" min="5" />
          </div>
          <div>
            <label>Display mode</label>
            <select id="displayMode">
              <option value="detailed">Detailed</option>
              <option value="compact">Compact</option>
              <option value="custom">Custom</option>
            </select>
          </div>
        </div>

        <label class="check"><input id="showDelta" type="checkbox" checked /> Show delta on the key</label>
        <label class="check"><input id="showTimestamp" type="checkbox" checked /> Show timestamp on the key</label>
        <label class="check"><input id="compactMode" type="checkbox" /> Use compact layout</label>

        <div class="card section" data-section="colors">
          <button class="section-toggle" type="button" data-target="colors">
            <span class="title-wrap">
              <p class="title">State colors</p>
              <p class="subtitle">Customize key colors for each state</p>
            </span>
            <span class="chevron">▾</span>
          </button>
          <div class="section-content">
            <div class="row">
              <div><label>In range</label><input id="okColor" type="color" value="#166534" /></div>
              <div><label>Low</label><input id="lowColor" type="color" value="#991b1b" /></div>
            </div>
            <div class="row">
              <div><label>High</label><input id="highColor" type="color" value="#92400e" /></div>
              <div><label>Stale</label><input id="staleColor" type="color" value="#4b5563" /></div>
            </div>
            <div class="row">
              <div><label>No data</label><input id="nodataColor" type="color" value="#1d4ed8" /></div>
              <div><label>Error</label><input id="errorColor" type="color" value="#9f1239" /></div>
            </div>
            <div><label>Setup</label><input id="setupColor" type="color" value="#1e3a8a" /></div>
          </div>
        </div>

        <button id="save">Save Settings</button>
        <div class="hint">
          Tip: switching to mmol/L auto-converts the low/high thresholds, but double-check your target ranges.
          Example: 80/180 mg/dL ≈ 4.4/10.0 mmol/L.
        </div>
      </div>
    </div>

    <script>
      let websocket;
      let uuid;
      let actionContext;
      let actionInfo;
      let lastUnit = 'mgdl';
      const sectionDefaults = { about: false, nightscout: false, settings: false, colors: true };

      const fields = ['baseUrl', 'lowThreshold', 'highThreshold', 'staleMinutes', 'pollSeconds', 'showDelta', 'showTimestamp', 'unit', 'compactMode', 'displayMode', 'okColor', 'lowColor', 'highColor', 'staleColor', 'nodataColor', 'errorColor', 'setupColor'];

      function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
        uuid = inUUID;
        actionInfo = JSON.parse(inActionInfo || '{}');
        actionContext = actionInfo.context;
        websocket = new WebSocket(`ws://127.0.0.1:${inPort}`);

        websocket.onopen = function () {
          websocket.send(JSON.stringify({ event: inRegisterEvent, uuid }));
          hydrate(actionInfo.payload?.settings || {});
        };
      }

      function hydrate(settings) {
        for (const field of fields) {
          const el = document.getElementById(field);
          if (!el) continue;
          if (el.type === 'checkbox') {
            el.checked = Boolean(settings[field] ?? el.checked);
          } else if (settings[field] !== undefined) {
            el.value = settings[field];
          }
        }
        applyDisplayMode(document.getElementById('displayMode').value || 'detailed', false);
        lastUnit = document.getElementById('unit').value || 'mgdl';
      }

      function payload() {
        return {
          baseUrl: document.getElementById('baseUrl').value.trim(),
          lowThreshold: Number(document.getElementById('lowThreshold').value || 80),
          highThreshold: Number(document.getElementById('highThreshold').value || 180),
          staleMinutes: Number(document.getElementById('staleMinutes').value || 15),
          pollSeconds: Number(document.getElementById('pollSeconds').value || 305),
          showDelta: document.getElementById('showDelta').checked,
          showTimestamp: document.getElementById('showTimestamp').checked,
          unit: document.getElementById('unit').value,
          compactMode: document.getElementById('compactMode').checked,
          displayMode: document.getElementById('displayMode').value,
          okColor: document.getElementById('okColor').value,
          lowColor: document.getElementById('lowColor').value,
          highColor: document.getElementById('highColor').value,
          staleColor: document.getElementById('staleColor').value,
          nodataColor: document.getElementById('nodataColor').value,
          errorColor: document.getElementById('errorColor').value,
          setupColor: document.getElementById('setupColor').value,
        };
      }

      function setSectionCollapsed(name, collapsed) {
        const section = document.querySelector(`.section[data-section="${name}"]`);
        if (!section) return;
        section.classList.toggle('collapsed', collapsed);
        const chev = section.querySelector('.chevron');
        if (chev) chev.textContent = collapsed ? '▸' : '▾';
      }

      function toggleSection(name) {
        const section = document.querySelector(`.section[data-section="${name}"]`);
        if (!section) return;
        setSectionCollapsed(name, !section.classList.contains('collapsed'));
      }

      function applyDisplayMode(mode, markCustom = true) {
        const showDelta = document.getElementById('showDelta');
        const showTimestamp = document.getElementById('showTimestamp');
        const compactMode = document.getElementById('compactMode');

        if (mode === 'detailed') {
          showDelta.checked = true;
          showTimestamp.checked = true;
          compactMode.checked = false;
        } else if (mode === 'compact') {
          showDelta.checked = false;
          showTimestamp.checked = false;
          compactMode.checked = true;
        } else if (markCustom) {
          document.getElementById('displayMode').value = 'custom';
        }
      }

      function convertThresholds(fromUnit, toUnit) {
        if (fromUnit === toUnit) return;
        const lowEl = document.getElementById('lowThreshold');
        const highEl = document.getElementById('highThreshold');
        const low = Number(lowEl.value || 0);
        const high = Number(highEl.value || 0);

        if (fromUnit === 'mgdl' && toUnit === 'mmol') {
          lowEl.value = (low / 18).toFixed(1);
          highEl.value = (high / 18).toFixed(1);
        } else if (fromUnit === 'mmol' && toUnit === 'mgdl') {
          lowEl.value = String(Math.round(low * 18));
          highEl.value = String(Math.round(high * 18));
        }
      }

      document.getElementById('displayMode').addEventListener('change', (e) => {
        applyDisplayMode(e.target.value, false);
      });

      ['showDelta', 'showTimestamp', 'compactMode'].forEach((id) => {
        document.getElementById(id).addEventListener('change', () => {
          applyDisplayMode('custom');
        });
      });

      document.getElementById('unit').addEventListener('change', (e) => {
        const nextUnit = e.target.value;
        convertThresholds(lastUnit, nextUnit);
        lastUnit = nextUnit;
      });

      document.getElementById('save').addEventListener('click', () => {
        if (!websocket || websocket.readyState !== 1) {
          return;
        }
        const settings = payload();
        websocket.send(JSON.stringify({
          event: 'setSettings',
          context: actionContext || uuid,
          payload: settings,
        }));
        websocket.send(JSON.stringify({
          action: actionInfo.action,
          event: 'sendToPlugin',
          context: uuid,
          payload: settings,
        }));
      });

      window.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('.section-toggle').forEach((btn) => {
          btn.addEventListener('click', () => toggleSection(btn.dataset.target));
        });
        Object.entries(sectionDefaults).forEach(([name, collapsed]) => setSectionCollapsed(name, collapsed));
      });
    </script>
  </body>
</html>
